<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#d4d4d4"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="#4c51bf" stroke-width="8"/>
  <!-- Back card -->
  <rect x="160" y="100" width="180" height="250" rx="12" fill="url(#card)" stroke="#888" stroke-width="4" transform="rotate(-8 250 225)"/>
  <!-- Middle card -->
  <rect x="160" y="100" width="180" height="250" rx="12" fill="url(#card)" stroke="#888" stroke-width="4" transform="rotate(4 250 225)"/>
  <!-- Front card -->
  <rect x="160" y="100" width="180" height="250" rx="12" fill="#fff" stroke="#555" stroke-width="4"/>
  <!-- Card inner border -->
  <rect x="175" y="115" width="150" height="220" rx="6" fill="none" stroke="#667eea" stroke-width="2"/>
  <!-- 5-pointed star (mana symbol) -->
  <polygon points="250,140 261,175 298,175 268,197 279,232 250,212 221,232 232,197 202,175 239,175" fill="#667eea" stroke="#4c51bf" stroke-width="2"/>
  <!-- Card text lines -->
  <rect x="195" y="250" width="110" height="6" rx="3" fill="#667eea" opacity="0.6"/>
  <rect x="195" y="265" width="90" height="6" rx="3" fill="#667eea" opacity="0.4"/>
  <rect x="195" y="280" width="100" height="6" rx="3" fill="#667eea" opacity="0.3"/>
  <!-- Sparkle top-right -->
  <circle cx="380" cy="130" r="8" fill="#ffd700" opacity="0.9"/>
  <circle cx="400" cy="160" r="5" fill="#ffd700" opacity="0.6"/>
  <circle cx="360" cy="110" r="4" fill="#ffd700" opacity="0.5"/>
  <!-- Bottom text arc hint -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#fff" letter-spacing="3">MDG</text>
</svg>
